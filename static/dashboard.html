<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ad Concept Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Main App Layout -->
    <div class="container" id="main-app">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <button id="back-btn" style="background: transparent; color: var(--primary); padding: 0.5rem 0; font-weight: 600; border: none; cursor: pointer;">&larr; Back to URL Scraper</button>
                <div id="auth-controls">
                    <button id="logout-btn" style="padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 0.5rem; background: rgba(255,255,255,0.1);">Logout</button>
                </div>
            </div>
            <div class="badge">Creator Dashboard</div>
            <h1>Generate Custom Product Ads</h1>
            <p>Upload your own product image, and provide descriptions to generate custom RSAs and Display Ad Concepts utilizing visual AI.</p>
        </header>

        <main>
            <!-- Manual Form -->
            <form id="manual-form">
                <div class="custom-card">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input style="width: 100%" type="text" id="product-name" required>
                    </div>
                    <div class="form-group">
                        <label>Product Description / Details</label>
                        <textarea id="product-details" rows="4" required placeholder="What makes this product special?"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Custom Target USP (optional)</label>
                        <input style="width: 100%" type="text" id="custom-usp" placeholder="e.g. 50% lighter than competitors">
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <input style="width: 100%; border: 1px dashed rgba(255,255,255,0.3); padding: 2rem; background: rgba(0,0,0,0.2)" type="file" id="product-image" accept="image/*" required>
                    </div>
                    <button type="submit" id="manual-submit-btn" style="width:100%; margin-top: 1rem; padding: 1rem;">
                        <span class="btn-text">Analyze & Generate Ads</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </form>

            <div class="error-msg" id="main-error-msg" style="margin-top: 1rem;"></div>

            <div id="results" class="hidden">
                <section class="section usp-section smooth-reveal">
                    <h2>Target USP</h2>
                    <div class="card usp-card">
                        <p id="usp-text">Loading...</p>
                    </div>
                </section>

                <section class="section rsa-section smooth-reveal delay-1">
                    <h2>Responsive Search Ads (RSAs)</h2>
                    <div id="rsa-container" class="card-grid">
                        <!-- RSAs -->
                    </div>
                </section>

                <section class="section display-section smooth-reveal delay-2">
                    <h2>Display Ad Concepts</h2>
                    <div id="display-container" class="card-grid">
                        <!-- Display ads -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
